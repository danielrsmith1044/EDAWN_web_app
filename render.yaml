databases:
  - name: edawn-db
    plan: free
    databaseName: edawn
    user: edawn

services:
  - type: web
    name: edawn-portal
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn edawn.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edawn-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.3"
