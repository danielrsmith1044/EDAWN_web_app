{% extends "base.html" %}

{% block title %}New Message – EDAWN{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'message_list' %}">Messages</a></li>
    <li class="breadcrumb-item active">New Message</li>
  </ol>
</nav>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-header py-3">
        <h5 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>New Message</h5>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label for="{{ form.subject.id_for_label }}" class="form-label fw-semibold">Subject</label>
            {{ form.subject }}
          </div>

          <div class="mb-3">
            <label for="{{ form.body.id_for_label }}" class="form-label fw-semibold">Message</label>
            {{ form.body }}
          </div>

          <div class="form-check mb-4">
            {{ form.is_private }}
            <label class="form-check-label" for="{{ form.is_private.id_for_label }}">
              <i class="bi bi-lock me-1"></i>{{ form.is_private.label }}
            </label>
            <div class="form-text">
              Private messages are only visible to you and admin staff.
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-send me-1"></i>Post Message
            </button>
            <a href="{% url 'message_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
