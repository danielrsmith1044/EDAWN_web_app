<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – EDAWN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f0f2f5; font-family:'Segoe UI',system-ui,sans-serif; }
    :root { --edawn-blue:#014684; --edawn-teal:#008b99; }
  </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="text-center px-3">
    <div style="font-size:5rem; color:var(--edawn-teal);">
      <i class="bi bi-map"></i>
    </div>
    <h1 class="fw-bold mt-3" style="color:var(--edawn-blue);">Page Not Found</h1>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn-primary px-4">Back to Dashboard</a>
  </div>
</div>
</body>
</html>
