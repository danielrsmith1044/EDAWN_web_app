{% extends "base.html" %}

{% block title %}Reset Password – EDAWN{% endblock %}

{% block auth_content %}
<div class="row justify-content-center align-items-center" style="min-height:100vh;">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4 mt-5">
      {% load static %}
      <img src="{% static 'img/edawn-logo.svg' %}" alt="EDAWN" style="max-width:220px; height:auto;" class="mb-2">
      <h5 class="fw-bold" style="color:#014684;">Business Builders Portal</h5>
      <p class="text-muted">Enter your email to receive a password reset link.</p>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control" autofocus required>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Send Reset Link</button>
          </div>
        </form>
      </div>
    </div>
    <div class="text-center mt-3">
      <small><a href="{% url 'login' %}">Back to Sign In</a></small>
    </div>
  </div>
</div>
{% endblock %}
