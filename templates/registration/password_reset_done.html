{% extends "base.html" %}

{% block title %}Check Your Email – EDAWN{% endblock %}

{% block auth_content %}
<div class="row justify-content-center align-items-center" style="min-height:100vh;">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4 mt-5">
      {% load static %}
      <img src="{% static 'img/edawn-logo.svg' %}" alt="EDAWN" style="max-width:220px; height:auto;" class="mb-2">
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-envelope-check fs-1 mb-3" style="color:var(--edawn-teal);"></i>
        <h5 class="fw-bold mb-2">Check your email</h5>
        <p class="text-muted small">If an account with that address exists, we've sent a password reset link. Check your inbox (and spam folder).</p>
      </div>
    </div>
    <div class="text-center mt-3">
      <small><a href="{% url 'login' %}">Back to Sign In</a></small>
    </div>
  </div>
</div>
{% endblock %}
