{% extends "base.html" %}

{% block title %}Change Password – EDAWN{% endblock %}

{% block content %}
<div class="page-header">
  <h4 class="mb-0 fw-bold"><i class="bi bi-key me-2"></i>Change Password</h4>
</div>

<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            <input type="password" name="{{ field.html_name }}" class="form-control"
                   {% if forloop.first %}autofocus{% endif %} required>
            {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors }}</div>
            {% endif %}
            {% if field.help_text %}
            <div class="form-text">{{ field.help_text }}</div>
            {% endif %}
          </div>
          {% endfor %}
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Update Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
