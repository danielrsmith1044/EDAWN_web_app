{% extends "base.html" %}

{% block title %}Password Reset Complete – EDAWN{% endblock %}

{% block auth_content %}
<div class="row justify-content-center align-items-center" style="min-height:100vh;">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4 mt-5">
      {% load static %}
      <img src="{% static 'img/edawn-logo.svg' %}" alt="EDAWN" style="max-width:220px; height:auto;" class="mb-2">
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-check-circle fs-1 mb-3 text-success d-block"></i>
        <h5 class="fw-bold mb-2">Password updated!</h5>
        <p class="text-muted small">Your password has been set. You can now sign in.</p>
        <a href="{% url 'login' %}" class="btn btn-primary mt-2">Sign In</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
