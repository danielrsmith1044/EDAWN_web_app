{% extends "base.html" %}

{% block title %}Password Updated – EDAWN{% endblock %}

{% block content %}
<div class="page-header">
  <h4 class="mb-0 fw-bold"><i class="bi bi-key me-2"></i>Change Password</h4>
</div>

<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-check-circle fs-1 text-success d-block mb-3"></i>
        <h5 class="fw-bold mb-2">Password updated!</h5>
        <p class="text-muted small">Your password has been changed successfully.</p>
        <a href="{% url 'dashboard' %}" class="btn btn-primary mt-2">Back to Dashboard</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
